name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.js"
      - "tsconfig*.json"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.js"
      - "tsconfig*.json"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - ".github/workflows/frontend-ci.yml"

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run build
        run: npm run build

